# gitleaks configuration — extends the default ruleset and allowlists known
# false positives. The committed XFS fixtures under tests/data are raw on-disk
# filesystem bytes (the dfvfs Tier-1 image xfs_dfvfs.raw, a freed-inode block,
# and xfs_db/TSK text dumps). Their high-entropy regions (UUIDs, v5 CRC fields,
# packed AG/inode keys) can trip gitleaks' generic high-entropy rules even
# though they hold no secrets. Scoped to the fixture paths so real secrets
# anywhere else still surface.
[extend]
useDefault = true

[allowlist]
description = "XFS on-disk fixtures are filesystem bytes, not secrets"
paths = [
  '''tests/data/.*\.raw$''',
  '''tests/data/.*\.img$''',
  '''tests/data/.*\.bin$''',
  '''tests/data/.*\.txt$''',
  '''tests/data/.*\.sha256$''',
]
