name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # Pinned to the rust-toolchain.toml version so fmt matches local exactly.
      - uses: dtolnay/rust-toolchain@1.96.0 # matches rust-toolchain.toml
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.96.0 # matches rust-toolchain.toml
        with:
          components: clippy
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      # --all-features exercises the optional `vfs` FileSystem adapter. Until
      # forensic-vfs 0.2.0 (with FsKind::Xfs) is published, the workspace patches
      # forensic-vfs to a local checkout, so this job requires that sibling repo
      # present; the default-feature jobs (test/msrv) are unaffected.
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.96.0 # matches rust-toolchain.toml
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      # --all-features exercises the optional `vfs` FileSystem adapter too. The
      # committed Tier-1 oracle (tests/data/xfs_dfvfs.raw) is always-on; the
      # large minted images (XFS_ORACLE_V5_IMG / XFS_BIGTIME_ORACLE) are env-gated
      # and skip cleanly when absent, so CI stays green.
      - run: cargo test --workspace --all-features

  msrv:
    # xfs-core is a published library; its MSRV is a downstream-facing promise.
    # xfs-core's own code compiles as low as 1.75 — the floor is dep-driven: the
    # batteries-included CRC32c decoder (`crc = "3"` -> `crc 3.4.0`) declares
    # rust-version 1.83, so default resolution fails below it. An explicit
    # version ref sets RUSTUP_TOOLCHAIN, which beats rust-toolchain.toml's pin.
    name: MSRV (1.83)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.83.0 # declared MSRV floor
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      # Default features only: the low-MSRV promise is for third-party consumers
      # who use the bare reader, not the optional `vfs` adapter.
      - run: cargo build -p xfs-core

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      # gitleaks-action requires a paid GITLEAKS_LICENSE for org repos; the CLI
      # binary is unrestricted. Fetch the latest release and scan the tree.
      - name: Install gitleaks
        run: |
          VERSION=8.30.1   # pinned: avoids flaky unauthenticated releases/latest API (404 under concurrency) + supply-chain drift
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar xz -C /tmp gitleaks
      - name: Run gitleaks
        run: /tmp/gitleaks detect --source . --config .gitleaks.toml

  coverage:
    name: Coverage (100% lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.96.0 # matches rust-toolchain.toml
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-llvm-cov
      # The library's I/O is generic over the byte source, so region/function
      # metrics are structurally < 100% (per-monomorphization). The meaningful,
      # monomorphization-robust invariant is that every executable source line is
      # hit at least once.
      #
      # Exception — panic-free defence in depth: a line carrying a
      # `// cov:unreachable` marker is a defensive guard (a `let-else { continue }`,
      # a bounds-checked `.get()` fallback, etc.) provably unreachable under a
      # dominating invariant, kept deliberately to stay panic-free if that
      # invariant is ever broken. Such lines cannot be exercised by any test and
      # are exempt. The gate fails on any OTHER zero-hit line.
      - name: Generate lcov
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: Enforce line coverage (unreachable defensive arms must carry // cov:unreachable)
        shell: bash
        run: |
          fail=0
          while IFS= read -r line; do
            if [[ "$line" == SF:* ]]; then
              f="${line#SF:}"
            elif [[ "$line" =~ ^DA:([0-9]+),0$ ]]; then
              n="${BASH_REMATCH[1]}"
              src="$(sed -n "${n}p" "$f")"
              if [[ "$src" == *cov:unreachable* ]]; then
                echo "exempt (// cov:unreachable): $f:$n"
              else
                echo "::error::Uncovered line $f:$n:$src"
                fail=1
              fi
            fi
          done < lcov.info
          if [[ "$fail" -ne 0 ]]; then exit 1; fi
          echo "All executable lines covered, or annotated // cov:unreachable."
