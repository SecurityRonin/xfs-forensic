
# cargo-vet config file

[cargo-vet]
version = "0.10"

[imports.bytecode-alliance]
url = "https://raw.githubusercontent.com/bytecodealliance/wasmtime/main/supply-chain/audits.toml"

[imports.embark]
url = "https://raw.githubusercontent.com/EmbarkStudios/rust-ecosystem/main/audits.toml"

[imports.google]
url = "https://raw.githubusercontent.com/google/rust-crate-audits/main/audits.toml"

[imports.mozilla]
url = "https://raw.githubusercontent.com/mozilla/supply-chain/main/audits.toml"

[policy.xfs-core]
audit-as-crates-io = false

[policy.xfs-forensic]
audit-as-crates-io = false

[[exemptions.cfg-if]]
version = "1.0.4"
criteria = "safe-to-run"

[[exemptions.cpufeatures]]
version = "0.2.17"
criteria = "safe-to-run"

[[exemptions.crc]]
version = "3.4.0"
criteria = "safe-to-deploy"

[[exemptions.crc-catalog]]
version = "2.5.0"
criteria = "safe-to-deploy"

[[exemptions.crypto-common]]
version = "0.1.7"
criteria = "safe-to-run"

[[exemptions.digest]]
version = "0.10.7"
criteria = "safe-to-run"

[[exemptions.forensic-vfs]]
version = "0.7.0"
criteria = "safe-to-deploy"

[[exemptions.forensicnomicon]]
version = "1.8.1"
criteria = "safe-to-deploy"

[[exemptions.forensicnomicon-core]]
version = "1.4.0"
criteria = "safe-to-deploy"

[[exemptions.forensicnomicon-data]]
version = "1.3.2"
criteria = "safe-to-deploy"

[[exemptions.libc]]
version = "0.2.186"
criteria = "safe-to-run"

[[exemptions.proc-macro2]]
version = "1.0.107"
criteria = "safe-to-deploy"

[[exemptions.quote]]
version = "1.0.47"
criteria = "safe-to-deploy"

[[exemptions.sha2]]
version = "0.10.9"
criteria = "safe-to-run"

[[exemptions.state-history-forensic]]
version = "0.1.0"
criteria = "safe-to-deploy"

[[exemptions.syn]]
version = "3.0.2"
criteria = "safe-to-deploy"

[[exemptions.thiserror]]
version = "2.0.19"
criteria = "safe-to-deploy"

[[exemptions.thiserror-impl]]
version = "2.0.19"
criteria = "safe-to-deploy"

[[exemptions.typenum]]
version = "1.20.1"
criteria = "safe-to-run"

[[exemptions.unicode-ident]]
version = "1.0.24"
criteria = "safe-to-deploy"

[[exemptions.version_check]]
version = "0.9.5"
criteria = "safe-to-run"
